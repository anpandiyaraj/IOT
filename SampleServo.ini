#include <Keypad.h>
#include <ESP32Servo.h>

// ================= SERVO =================
Servo gateServo;
#define SERVO_PIN 18

int openPos = 90;
int closePos = 0;

// ================= ULTRASONIC =================
#define TRIG_PIN 4
#define ECHO_PIN 5

const int triggerDistance = 60; // cm (adjust)
unsigned long lastSensorTrigger = 0;
const unsigned long sensorCooldown = 5000; // 5 sec

// ================= KEYPAD =================
#define ROW_NUM 4
#define COLUMN_NUM 4

char keys[ROW_NUM][COLUMN_NUM] = {
  {'1','2','3','A'},
  {'4','5','6','B'},
  {'7','8','9','C'},
  {'*','0','#','D'}
};

byte pin_rows[ROW_NUM] = {13, 12, 14, 27};
byte pin_column[COLUMN_NUM] = {26, 25, 33, 32};

Keypad keypad = Keypad(makeKeymap(keys), pin_rows, pin_column, ROW_NUM, COLUMN_NUM);

// ================= ACCESS =================
const char* allowedCodes[] = {"1234", "5678", "9999"};
const int numCodes = sizeof(allowedCodes) / sizeof(allowedCodes[0]);

char enteredCode[5];
byte codeIndex = 0;

// ================= SECURITY =================
int failedAttempts = 0;
bool systemLocked = false;
unsigned long lockTimer = 0;

// ================= TIMERS =================
unsigned long inputTimer = 0;
const unsigned long inputTimeout = 5000;

bool gateOpen = false;
unsigned long gateTimer = 0;
const unsigned long gateOpenTime = 4000; // auto close delay

// ================= SETUP =================
void setup() {
  Serial.begin(9600);

  pinMode(TRIG_PIN, OUTPUT);
  pinMode(ECHO_PIN, INPUT);

  gateServo.attach(SERVO_PIN, 500, 2400);
  gateServo.write(closePos);
  delay(500);
  gateServo.detach();

  keypad.setDebounceTime(50);

  Serial.println("Gate System Ready");
}

// ================= LOOP =================
void loop() {
  char key = keypad.getKey();

  // Unlock system after timeout
  if (systemLocked && millis() - lockTimer > 10000) {
    systemLocked = false;
    failedAttempts = 0;
    Serial.println("System Unlocked");
  }

  // Handle keypad
  if (!systemLocked && key) {
    handleKey(key);
    inputTimer = millis();
  }

  // Input timeout
  if (codeIndex > 0 && millis() - inputTimer > inputTimeout) {
    clearCode();
    Serial.println("Input timeout");
  }

  // Ultrasonic auto open
  checkSensor();

  // Auto close
  if (gateOpen && millis() - gateTimer > gateOpenTime) {
    closeGate();
  }
}

// ================= ULTRASONIC FUNCTION =================
int getDistance() {
  long duration;
  int distance;

  digitalWrite(TRIG_PIN, LOW);
  delayMicroseconds(2);

  digitalWrite(TRIG_PIN, HIGH);
  delayMicroseconds(10);
  digitalWrite(TRIG_PIN, LOW);

  duration = pulseIn(ECHO_PIN, HIGH, 30000); // timeout 30ms
  if (duration == 0) return -1;

  distance = duration * 0.034 / 2;
  return distance;
}

void checkSensor() {
  if (gateOpen) return;
  if (millis() - lastSensorTrigger < sensorCooldown) return;

  int d = getDistance();

  if (d > 0 && d < triggerDistance) {
    Serial.print("Vehicle detected: ");
    Serial.println(d);

    openGate();
    lastSensorTrigger = millis();
  }
}

// ================= KEYPAD =================
void handleKey(char key) {
  Serial.println(key);

  if (key == '#') {
    if (codeIndex == 4) {
      enteredCode[4] = '\0';

      if (checkCode(enteredCode)) {
        Serial.println("ACCESS GRANTED");
        openGate();
        failedAttempts = 0;
      } else {
        Serial.println("ACCESS DENIED");
        failedAttempts++;

        if (failedAttempts >= 3) {
          systemLocked = true;
          lockTimer = millis();
          Serial.println("SYSTEM LOCKED (10s)");
        }
      }
    } else {
      Serial.println("Enter 4 digits");
    }
    clearCode();
  }
  else if (key == '*') {
    clearCode();
    Serial.println("Cleared");
  }
  else if (key >= '0' && key <= '9') {
    if (codeIndex < 4) {
      enteredCode[codeIndex++] = key;

      Serial.print("Code: ");
      for (int i = 0; i < codeIndex; i++) Serial.print("*");
      Serial.println();
    }
  }
}

// ================= UTIL =================
void clearCode() {
  codeIndex = 0;
  memset(enteredCode, 0, sizeof(enteredCode));
}

bool checkCode(const char* code) {
  for (int i = 0; i < numCodes; i++) {
    if (strcmp(code, allowedCodes[i]) == 0) return true;
  }
  return false;
}

// ================= SERVO =================
void openGate() {
  if (gateOpen) return;

  gateServo.attach(SERVO_PIN, 500, 2400);

  for (int pos = closePos; pos <= openPos; pos++) {
    gateServo.write(pos);
    delay(10);
  }

  gateOpen = true;
  gateTimer = millis();
  Serial.println("Gate Opened");
}

void closeGate() {
  for (int pos = openPos; pos >= closePos; pos--) {
    gateServo.write(pos);
    delay(10);
  }

  delay(300);
  gateServo.detach();

  gateOpen = false;
  Serial.println("Gate Closed");
}
