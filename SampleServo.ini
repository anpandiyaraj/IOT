#include <Keypad.h>
#include <ESP32Servo.h>

// ================= SERVO SETUP =================
Servo gateServo;

#define SERVO_PIN 18

int openPos = 90;
int closePos = 0;

// ================= KEYPAD SETUP =================
#define ROW_NUM 4
#define COLUMN_NUM 4

char keys[ROW_NUM][COLUMN_NUM] = {
  {'1','2','3','A'},
  {'4','5','6','B'},
  {'7','8','9','C'},
  {'*','0','#','D'}
};

byte pin_rows[ROW_NUM] = {13, 12, 14, 27};
byte pin_column[COLUMN_NUM] = {26, 25, 33, 32};

Keypad keypad = Keypad(makeKeymap(keys), pin_rows, pin_column, ROW_NUM, COLUMN_NUM);

// ================= ACCESS CONTROL =================
const char* allowedCodes[] = {"1234", "5678", "9999"};
const int numCodes = sizeof(allowedCodes) / sizeof(allowedCodes[0]);

char enteredCode[5];
byte codeIndex = 0;

// ================= SECURITY =================
int failedAttempts = 0;
bool systemLocked = false;
unsigned long lockTimer = 0;

// ================= INPUT TIMEOUT =================
unsigned long inputTimer = 0;
const unsigned long inputTimeout = 5000;

// ================= GATE CONTROL =================
bool gateOpen = false;
unsigned long gateTimer = 0;

// ================= SETUP =================
void setup() {
  Serial.begin(9600);

  gateServo.attach(SERVO_PIN, 500, 2400);
  gateServo.write(closePos);
  delay(500);
  gateServo.detach(); // reduce jitter

  keypad.setDebounceTime(50);

  Serial.println("Gate System Ready");
  Serial.println("Enter 4-digit code + press #");
}

// ================= LOOP =================
void loop() {
  char key = keypad.getKey();

  // Unlock system after timeout
  if (systemLocked && millis() - lockTimer > 10000) {
    systemLocked = false;
    failedAttempts = 0;
    Serial.println("System Unlocked");
  }

  // Handle keypad input
  if (!systemLocked && key) {
    handleKey(key);
    inputTimer = millis();
  }

  // Input timeout clear
  if (codeIndex > 0 && millis() - inputTimer > inputTimeout) {
    Serial.println("Input timeout");
    clearCode();
  }

  // Auto close gate
  if (gateOpen && millis() - gateTimer > 3000) {
    closeGate();
  }
}

// ================= HANDLE KEYPAD =================
void handleKey(char key) {
  Serial.println(key);

  // ENTER
  if (key == '#') {
    if (codeIndex == 4) {
      enteredCode[4] = '\0';

      if (checkCode(enteredCode)) {
        if (!gateOpen) {
          Serial.println("ACCESS GRANTED");
          openGate();
        }
        failedAttempts = 0;
      } else {
        Serial.println("ACCESS DENIED");
        failedAttempts++;

        if (failedAttempts >= 3) {
          Serial.println("LOCKED for 10 seconds");
          systemLocked = true;
          lockTimer = millis();
        }
      }
    } else {
      Serial.println("Enter exactly 4 digits");
    }
    clearCode();
  }

  // CLEAR
  else if (key == '*') {
    clearCode();
    Serial.println("Cleared");
  }

  // ONLY NUMBERS
  else if (key >= '0' && key <= '9') {
    if (codeIndex < 4) {
      enteredCode[codeIndex++] = key;

      Serial.print("Code: ");
      for (int i = 0; i < codeIndex; i++) Serial.print("*");
      Serial.println();
    }
  }
}

// ================= CLEAR INPUT =================
void clearCode() {
  codeIndex = 0;
  memset(enteredCode, 0, sizeof(enteredCode));
}

// ================= CODE CHECK =================
bool checkCode(const char* code) {
  for (int i = 0; i < numCodes; i++) {
    if (strcmp(code, allowedCodes[i]) == 0) {
      return true;
    }
  }
  return false;
}

// ================= SERVO CONTROL =================
void openGate() {
  gateServo.attach(SERVO_PIN, 500, 2400);

  for (int pos = closePos; pos <= openPos; pos++) {
    gateServo.write(pos);
    delay(10); // smooth movement
  }

  gateOpen = true;
  gateTimer = millis();
}

void closeGate() {
  for (int pos = openPos; pos >= closePos; pos--) {
    gateServo.write(pos);
    delay(10);
  }

  delay(300);   // settle
  gateServo.detach();

  gateOpen = false;
  Serial.println("Gate Closed");
}
